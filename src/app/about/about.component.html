<header class="site-header">
  <a class="brand" href="#home">
    <span class="brand-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
    <path d="M12 21c0-6 4-8 8-9-1 5-3 9-8 9Z" />
    <path d="M12 21c0-7-4-9-8-10 1 6 3 10 8 10Z" />
    </svg>
    </span>
    <span class="brand-name">{{ brandName }}</span>
  </a>

  <nav class="main-nav" aria-label="Main">
    <a
      *ngFor="let link of navLinks"
      [href]="link.href"
      class="nav-link"
      [class.active]="link.active"
    >{{ link.label }}</a>
  </nav>

  <div class="header-actions">
    <button class="icon-btn" type="button" aria-label="Wishlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M12 20.5s-7-4.35-9.5-8.6C.8 8.6 2 5 5.3 4.2c2-.5 4 .4 5.2 2.1.3.4.9.4 1.2 0 1.2-1.7 3.2-2.6 5.2-2.1C20.2 5 21.4 8.6 19.7 11.9c-2.5 4.25-9.5 8.6-9.5 8.6Z"/>
      </svg>
    </button>
    <button class="icon-btn" type="button" aria-label="Cart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M3 4h2l2.4 12.2a2 2 0 0 0 2 1.6h7.2a2 2 0 0 0 2-1.6L20 8H6" />
        <circle cx="9" cy="20" r="1.4" />
        <circle cx="17" cy="20" r="1.4" />
      </svg>
    </button>
  </div>
</header>

<section class="story-section">
  <div class="story-grid">
    <div class="story-media">
      <img [src]="storyImageUrl" alt="Greenhouse interior at Verdant & Co." />
      <div class="media-badge">
        <span class="badge-value">{{ imageBadge.value }}</span>
        <span class="badge-label" *ngFor="let line of imageBadge.labelLines">{{ line }}</span>
      </div>
    </div>

    <div class="story-content">
      <p class="eyebrow">— {{ eyebrow }}</p>

      <h1 class="headline">
        <span
          *ngFor="let line of headlineLines"
          class="headline-line"
          [class.accent]="line.style === 'accent'"
        >{{ line.text }}</span>
      </h1>

      <p class="paragraph" *ngFor="let para of paragraphs">{{ para }}</p>

      <div class="stat-row">
        <ng-container *ngFor="let stat of stats; let last = last">
          <div class="stat-item">
            <span class="stat-value">{{ stat.value }}</span>
            <span class="stat-label">{{ stat.label }}</span>
          </div>
          <span class="stat-divider" *ngIf="!last"></span>
        </ng-container>
      </div>
    </div>
  </div>
</section>
