<nav>
    <a routerLink="" class="logo">
        <span class="material-symbols-outlined logo-icon">
            potted_plant
        </span>
        Plants &amp; Co
    </a>

    <div class="nav-links">
        <a routerLink="">Home</a>
        <a routerLink="featured-plants">Shop</a>
        <a routerLink="care">Care</a>
        <a routerLink="about">About</a>
    </div>

    <div class="nav-actions">

        <!-- User Name -->
        <span class="user-name">
            {{ userName }}
        </span>

        <!-- Show Cart only for logged-in users -->
        <a
            *ngIf="role !== 'GUEST'"
            routerLink="cart"
            class="icon-button"
            aria-label="Cart"
        >
            <span class="material-symbols-outlined">
                shopping_cart
            </span>
        </a>

        <!-- Login button for guests -->
        <a
            *ngIf="role === 'GUEST'"
            routerLink="/login"
            class="login-btn"
        >
            Login
        </a>

        <!-- Logout button for logged-in users -->
        <button
            *ngIf="role !== 'GUEST'"
            class="logout-btn"
            (click)="logout()"
        >
            Logout
        </button>

    </div>
</nav>

<router-outlet></router-outlet>
