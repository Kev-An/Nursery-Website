

<main class="wishlist-container">
    <p class="subtitle">- SAVED FOR LATER</p>
    <h1 class="title">Wishlist</h1>

    <div class="product-grid" *ngIf="wishlistItems.length > 0; else emptyState">
        <div class="product-card" *ngFor="let item of wishlistItems">
            <div class="image-container">
                <img [src]="item.imageUrl" [alt]="item.name">
                <button class="remove-btn" (click)="removeFromWishlist(item)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="product-details">
                <h3 class="product-name">{{ item.name }}</h3>
                <p class="product-price">${{ item.price }}</p>
                <button class="move-to-cart-btn" (click)="moveToCart(item)">MOVE TO CART</button>
            </div>
        </div>
    </div>

    <ng-template #emptyState>
        <div class="empty-state-container">
            <svg class="empty-heart-icon" width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5">
                <path
                    d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                </path>
            </svg>
            <h2 class="empty-title">Nothing saved yet</h2>
            <p class="empty-subtitle">Click the heart on any plant to save it here.</p>
            <button class="browse-btn">BROWSE COLLECTION &gt;</button>
        </div>
    </ng-template>
</main>
